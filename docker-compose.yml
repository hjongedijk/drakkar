services:
  drakkar:
    build:
      context: .
    image: drakkar:latest
    container_name: drakkar
    restart: unless-stopped
    environment:
      DRAKKAR_SETTINGS_PATH: /app/data/settings.json
      DRAKKAR_HTTP_ADDR: :8080
      DRAKKAR_VFS_BASE_URL: http://drakkar:8080
      DRAKKAR_RCLONE_MOUNT: /mnt/drakkar/vfs
      DRAKKAR_RCLONE_RC: http://drakkar_rclone:5572
    volumes:
      - ./data:/app/data
      - /mnt:/mnt:rshared
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: drakkar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: drakkar
      POSTGRES_USER: drakkar
      POSTGRES_PASSWORD: change-me
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drakkar -d drakkar"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: drakkar_valkey
    restart: unless-stopped
    volumes:
      - ./data/valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rclone:
    image: rclone/rclone:latest
    container_name: drakkar_rclone
    restart: unless-stopped
    volumes:
      - ./data/rclone:/config/rclone
      - /mnt/drakkar/vfs:/mnt/drakkar/vfs:rshared
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    ports:
      - "5572:5572"
    command: >
      mount drakkar:
      /mnt/drakkar/vfs
      --allow-non-empty
      --allow-other
      --vfs-cache-mode full
      --vfs-cache-max-size 1G
      --dir-cache-time 5m
      --poll-interval 30s
      --rc
      --rc-addr :5572
      --rc-no-auth
      --log-level INFO
    depends_on:
      - drakkar

  seerr:
    image: ghcr.io/sct/seerr:latest
    container_name: drakkar_seerr
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - ./data/seerr:/app/config

  nzbhydra2:
    image: lscr.io/linuxserver/nzbhydra2:latest
    container_name: drakkar_nzbhydra2
    restart: unless-stopped
    ports:
      - "5076:5076"
    volumes:
      - ./data/nzbhydra2:/config
