services:
  drakkar:
    build:
      context: .
    image: drakkar:latest
    container_name: drakkar
    restart: unless-stopped
    environment:
      DRAKKAR_SETTINGS_PATH: /app/data/settings.json
      DRAKKAR_HTTP_ADDR: :8080
      DRAKKAR_VFS_BASE_URL: http://drakkar:8080
    volumes:
      - ./data/settings.json:/app/data/settings.json:ro
      - ./data/logs:/app/data/logs
      - /mnt/drakkar/media:/mnt/drakkar/media
      - /mnt/drakkar/cache:/mnt/drakkar/cache
      - /mnt/drakkar/staging:/mnt/drakkar/staging
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: drakkar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: drakkar
      POSTGRES_USER: drakkar
      POSTGRES_PASSWORD: change-me
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drakkar -d drakkar"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: drakkar_valkey
    restart: unless-stopped
    volumes:
      - ./data/valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  seerr:
    image: ghcr.io/sct/seerr:latest
    container_name: drakkar_seerr
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - ./data/seerr:/app/config

  nzbhydra2:
    image: lscr.io/linuxserver/nzbhydra2:latest
    container_name: drakkar_nzbhydra2
    restart: unless-stopped
    ports:
      - "5076:5076"
    volumes:
      - ./data/nzbhydra2:/config
